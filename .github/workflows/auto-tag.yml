name: Auto-tag on push to main

on:
  push:
    branches:
      - main

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Push the tag under a PAT so it re-triggers publish-npm / publish-pypi.
          # GitHub deliberately does not let the default GITHUB_TOKEN trigger other
          # workflows. Falls back to GITHUB_TOKEN until RELEASE_PAT exists (tag is
          # still created, nothing publishes — same as before this change).
          token: ${{ secrets.RELEASE_PAT || github.token }}

      - name: Bump patch version
        id: bump
        run: |
          latest=$(git tag -l 'v*' --sort=-version:refname | head -1)
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi
          version="${latest#v}"
          major=$(echo "$version" | cut -d. -f1)
          minor=$(echo "$version" | cut -d. -f2)
          patch=$(echo "$version" | cut -d. -f3)
          new_tag="v${major}.${minor}.$((patch + 1))"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "Bumping $latest → $new_tag"

      - name: Push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.bump.outputs.new_tag }}"
          git push origin "${{ steps.bump.outputs.new_tag }}"
