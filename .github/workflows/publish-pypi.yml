name: Publish to PyPI

# Runs after "Auto-tag on push to main" finishes. workflow_run is used instead of
# `on: push: tags` because the tag is pushed by GITHUB_TOKEN, and GitHub does not let
# GITHUB_TOKEN-pushed tags start `on: push: tags` runs — so those never fired.
# The filename stays publish-pypi.yml so the PyPI OIDC trusted publisher still matches.
# workflow_dispatch stays as a manual re-publish escape hatch (publishes the latest tag).
on:
  workflow_run:
    workflows: ["Auto-tag on push to main"]
    types: [completed]
  workflow_dispatch: {}

jobs:
  publish:
    # Skip if the auto-tag run failed or was cancelled (manual dispatch always runs).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC trusted publisher

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need tags to resolve the version

      - name: Resolve version from latest tag
        id: ver
        run: |
          tag=$(git describe --tags --abbrev=0)
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "Publishing ${tag#v}"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install hatch

      - name: Copy README into package
        run: cp README.md packages/python/README.md

      - name: Set version
        run: sed -i "s/^version = .*/version = \"${{ steps.ver.outputs.version }}\"/" pyproject.toml
        working-directory: packages/python

      - name: Build
        run: hatch build
        working-directory: packages/python

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist/
