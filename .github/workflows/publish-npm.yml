name: Publish to npm

# Runs after "Auto-tag on push to main" finishes. workflow_run is used instead of
# `on: push: tags` because the tag is pushed by GITHUB_TOKEN, and GitHub does not let
# GITHUB_TOKEN-pushed tags start `on: push: tags` runs — so those never fired.
# workflow_dispatch stays as a manual re-publish escape hatch (publishes the latest tag).
on:
  workflow_run:
    workflows: ["Auto-tag on push to main"]
    types: [completed]
  workflow_dispatch: {}

jobs:
  publish:
    # Skip if the auto-tag run failed or was cancelled (manual dispatch always runs).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # OIDC — publish via the npm trusted publisher (no NPM_TOKEN)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need tags to resolve the version

      - name: Resolve version from latest tag
        id: ver
        run: |
          tag=$(git describe --tags --abbrev=0)
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "Publishing ${tag#v}"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # npm OIDC trusted publishing needs npm >= 11.5.1; Node 22 ships npm 10.x.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install
        working-directory: packages/js

      - name: Build
        run: npm run build
        working-directory: packages/js

      # `npm pkg set` is idempotent — `npm version` errors with "Version not changed"
      # when package.json already equals the tag, which is what broke earlier publishes.
      - name: Set version
        run: npm pkg set version=${{ steps.ver.outputs.version }}
        working-directory: packages/js

      - name: Copy README
        run: cp README.md packages/js/README.md

      # No NPM_TOKEN needed: an npm trusted publisher (OIDC) is bound to this workflow,
      # so publish authenticates tokenlessly. Repo is public, so npm attaches provenance.
      - name: Publish
        run: npm publish --access public
        working-directory: packages/js
